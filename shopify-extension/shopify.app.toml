# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "9c9266451d617c1bd641ad17af3c9e28"
name = "ShopCX"
application_url = "https://shopcx.ai/admin/"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-01"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_all_orders,read_customers,write_customers,read_customer_payment_methods,read_discounts,write_discounts,write_draft_orders,read_inventory,read_merchant_managed_fulfillment_orders,read_orders,write_orders,read_product_listings,read_products,write_products,read_publications,read_returns,write_returns,read_shopify_payments_disputes,read_themes,write_themes,read_channels,read_store_credit_accounts,read_store_credit_account_transactions,write_store_credit_account_transactions"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ ]

[app_proxy]
url = "https://shopcx.ai/api/portal"
subpath = "portal-v2"
prefix = "apps"

# Loyalty checkout UI extension
[[extensions]]
type = "checkout_ui_extension"
name = "Loyalty Rewards"
handle = "loyalty-checkout"

[extensions.settings]
[[extensions.settings.fields]]
key = "api_endpoint"
type = "single_line_text_field"
name = "API Endpoint"
description = "Base URL for loyalty API"
